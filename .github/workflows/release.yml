name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # SymEngine v0.13 uses cmake_minimum_required < 3.5, rejected by CMake 3.31+
  SYMENGINE_CMAKE_COMPAT: -DCMAKE_POLICY_VERSION_MINIMUM=3.5

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            artifact: symbolic-math-mcp-linux-x86_64.tar.gz
          - name: linux-aarch64
            os: ubuntu-22.04
            artifact: symbolic-math-mcp-linux-aarch64.tar.gz
            cross_arch: aarch64
          - name: macos-arm64
            os: macos-14
            artifact: symbolic-math-mcp-macos-arm64.tar.gz
          - name: windows-x86_64
            os: windows-latest
            artifact: symbolic-math-mcp-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      # --- Linux native (x86_64) ---
      - name: Install GMP (Linux x86_64)
        if: matrix.name == 'linux-x86_64'
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev

      - name: Build (Linux x86_64)
        if: matrix.name == 'linux-x86_64'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release $SYMENGINE_CMAKE_COMPAT
          cmake --build build --config Release

      - name: Test (Linux x86_64)
        if: matrix.name == 'linux-x86_64'
        run: cd build && ctest --output-on-failure

      # --- Linux cross (aarch64) ---
      - name: Install cross toolchain (Linux aarch64)
        if: matrix.cross_arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libboost-dev

      - name: Build (Linux aarch64)
        if: matrix.cross_arch == 'aarch64'
        run: |
          cat > toolchain-aarch64.cmake << 'TOOLCHAIN'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE BOTH)
          TOOLCHAIN
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=toolchain-aarch64.cmake \
            -DSYMBOLIC_MATH_BUILD_TESTS=OFF \
            $SYMENGINE_CMAKE_COMPAT
          cmake --build build --config Release

      # --- macOS arm64 ---
      - name: Install GMP (macOS)
        if: matrix.name == 'macos-arm64'
        run: brew install gmp

      - name: Build (macOS arm64)
        if: matrix.name == 'macos-arm64'
        run: |
          GMP_PREFIX=$(brew --prefix gmp)
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            $SYMENGINE_CMAKE_COMPAT \
            -DCMAKE_PREFIX_PATH="$GMP_PREFIX" \
            -DGMP_INCLUDE_DIR="$GMP_PREFIX/include" \
            -DGMP_LIBRARY="$GMP_PREFIX/lib/libgmp.dylib"
          cmake --build build --config Release

      - name: Test (macOS arm64)
        if: matrix.name == 'macos-arm64'
        run: cd build && ctest --output-on-failure

      # --- Windows ---
      - name: Install Boost (Windows)
        if: matrix.name == 'windows-x86_64'
        shell: pwsh
        run: choco install boost-msvc-14.3 -y

      - name: Build (Windows)
        if: matrix.name == 'windows-x86_64'
        shell: pwsh
        run: |
          $boostDir = (Get-ChildItem -Directory "C:\local\boost_*" -ErrorAction SilentlyContinue | Select-Object -First 1)
          $boostFlag = if ($boostDir) { "-DBOOST_ROOT=$($boostDir.FullName)" } else { "" }
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 $boostFlag
          cmake --build build --config Release

      - name: Test (Windows)
        if: matrix.name == 'windows-x86_64'
        run: cd build && ctest --output-on-failure -C Release

      # --- Package ---
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.artifact }} -C build symbolic-math-mcp

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Get-ChildItem -Path build -Recurse -Filter "symbolic-math-mcp.exe" | Select-Object -First 1
          Compress-Archive -Path $bin.FullName -DestinationPath "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            symbolic-math-mcp-*.tar.gz
            symbolic-math-mcp-*.zip

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            artifact: symbolic-math-mcp-linux-x86_64.tar.gz
          - name: linux-aarch64
            os: ubuntu-22.04
            artifact: symbolic-math-mcp-linux-aarch64.tar.gz
            cross_arch: aarch64
          - name: macos-universal
            os: macos-14
            artifact: symbolic-math-mcp-macos-universal.tar.gz
          - name: windows-x86_64
            os: windows-latest
            artifact: symbolic-math-mcp-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      # --- Linux native (x86_64) ---
      - name: Install GMP (Linux x86_64)
        if: matrix.name == 'linux-x86_64'
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev

      - name: Build (Linux x86_64)
        if: matrix.name == 'linux-x86_64'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Test (Linux x86_64)
        if: matrix.name == 'linux-x86_64'
        run: cd build && ctest --output-on-failure

      # --- Linux cross (aarch64) ---
      - name: Install cross toolchain (Linux aarch64)
        if: matrix.cross_arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libgmp-dev

      - name: Build (Linux aarch64)
        if: matrix.cross_arch == 'aarch64'
        run: |
          cat > toolchain-aarch64.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=toolchain-aarch64.cmake \
            -DSYMBOLIC_MATH_BUILD_TESTS=OFF
          cmake --build build --config Release

      # --- macOS universal ---
      - name: Install GMP (macOS)
        if: matrix.name == 'macos-universal'
        run: brew install gmp

      - name: Build (macOS universal)
        if: matrix.name == 'macos-universal'
        run: |
          # Build arm64
          cmake -B build-arm64 -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DSYMBOLIC_MATH_BUILD_TESTS=OFF
          cmake --build build-arm64 --config Release

          # Build x86_64
          cmake -B build-x86_64 -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DSYMBOLIC_MATH_BUILD_TESTS=OFF
          cmake --build build-x86_64 --config Release

          # Combine with lipo
          mkdir -p build
          lipo -create \
            build-arm64/symbolic-math-mcp \
            build-x86_64/symbolic-math-mcp \
            -output build/symbolic-math-mcp

      - name: Test (macOS arm64)
        if: matrix.name == 'macos-universal'
        run: |
          cmake -B build-test -DCMAKE_BUILD_TYPE=Release
          cmake --build build-test --config Release
          cd build-test && ctest --output-on-failure

      # --- Windows ---
      - name: Build (Windows)
        if: matrix.name == 'windows-x86_64'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Test (Windows)
        if: matrix.name == 'windows-x86_64'
        run: cd build && ctest --output-on-failure -C Release

      # --- Package ---
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN=build/symbolic-math-mcp
          if [ "${{ matrix.cross_arch }}" = "aarch64" ]; then
            BIN=build/symbolic-math-mcp
          fi
          tar czf ${{ matrix.artifact }} -C $(dirname $BIN) $(basename $BIN)

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Get-ChildItem -Path build -Recurse -Filter "symbolic-math-mcp.exe" | Select-Object -First 1
          Compress-Archive -Path $bin.FullName -DestinationPath "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            symbolic-math-mcp-*.tar.gz
            symbolic-math-mcp-*.zip
